[tools]
android-sdk = "1.0"
gradle = "8.14.4"
java = "21.0.2"
kotlin = "2.1.21"

[env]
ANDROID_SIGNING_ITEM = "ANDROID_APP_SIGNING"

[tasks.dev]
description = "Build debug APK without release signing credentials"
run = "./gradlew assembleDebug"

[tasks.build]
description = "Build signed release APK from rbw Android signing item"
run = "bash ./scripts/android-release-build.sh"

[tasks.setup-github-action-secrets]
description = "Copy Android signing secrets from rbw to GitHub Actions secrets"
run = "bash ./scripts/setup-github-secrets.sh"

[tasks.lint]
description = "Run static analysis (Detekt)"
run = "./gradlew detekt"

[tasks.fmt]
description = "Format code (Spotless/Ktlint)"
run = "./gradlew spotlessApply"

[tasks.check]
description = "Run all checks (Formatting check + Detekt)"
run = "./gradlew spotlessCheck detekt"

[tasks.clean]
description = "Clean build artifacts"
run = "./gradlew clean"

[tasks.publish]
description = "Bump version, tag, and push to trigger release (Usage: mise run publish 1.0.1)"
run = "./scripts/publish.sh"
